version: "3"

services:
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app

  app:
    build:
      context: ../../.
      dockerfile: ./deploy/stage/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mongo

  mongo:
    image: mongo:4.4
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - ../../configs/stage/mongo.env
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
